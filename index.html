    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');

    :root{
      --bg:#f0f0f0;
      --brand:#4a4d9e;
      --dark:#111827;
      --muted:#6b7280;
      --danger:#ef4444;
      --success:#22c55e;
      --warn:#f59e0b;
      --card:#ffffff;
    }
    *{box-sizing:border-box}
    html,body{min-height:100%;margin:0}
    body{
      background:radial-gradient(circle at top,#ffffff 0,#f0f0f0 52%,#e7e8fa 100%);
      color:var(--dark);
      font-family:'Tajawal',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      display:flex;
      justify-content:center;
      padding:14px;
    }
    body.home-mode{padding:0;background:#000;display:block;overflow:hidden}
    body.game-mode{
      padding:0;
      min-height:100vh;
      background-color:#f0f0f0;
      background-image:url('game-bg.png');
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
    }
    #app{
      width:100%;
      max-width:520px;
      min-height:92vh;
      max-height:94vh;
      background:rgba(240,240,240,.92);
      border-radius:32px;
      box-shadow:0 18px 55px rgba(23,24,39,.12);
      overflow:auto;
      position:relative;
      border:1px solid rgba(74,77,158,.12);
      scroll-behavior:auto;
    }
    #app.home-mode{
      width:100vw;max-width:none;height:100vh;min-height:100vh;max-height:none;
      border-radius:0;border:0;box-shadow:none;background:#000;overflow:auto;
    }
    #app.game-mode{
      width:100vw;
      max-width:none;
      height:100vh;
      min-height:100vh;
      max-height:none;
      border-radius:0;
      border:0;
      box-shadow:none;
      background:transparent;
      overflow:auto;
    }

    .screen{padding:18px;min-height:100%}
    .center{min-height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:18px}
    h1,h2,h3,p{margin:0}
    .brand{color:var(--brand)}
    .sub{color:var(--muted);line-height:1.7}
    .tiny{font-size:12px;color:var(--muted);line-height:1.6}
    .text-center{text-align:center}
    .text-right{text-align:right}
    .mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
    .mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
    .w-full{width:100%}
    .space-y-3>*+*{margin-top:12px}.space-y-4>*+*{margin-top:16px}

    .logo-mark{
      width:86px;height:86px;border-radius:28px;background:var(--brand);color:#fff;
      display:grid;place-items:center;font-size:38px;font-weight:900;
      box-shadow:0 12px 26px rgba(74,77,158,.32);transform:rotate(-4deg)
    }
    .home-page{position:relative;background-size:cover;background-position:center;border-radius:0}
    .home-page::before{content:"";position:absolute;inset:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(4px);pointer-events:none;z-index:0}

    .btn{
      width:100%;border:0;border-radius:18px;padding:14px 18px;font-weight:900;font-size:16px;
      cursor:pointer;transition:transform .12s, opacity .12s;display:flex;align-items:center;justify-content:center;gap:8px;
      font-family:inherit;
    }
    .btn:active{transform:scale(.98)}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
    .btn-primary{background:var(--brand);color:#fff;box-shadow:0 10px 20px rgba(74,77,158,.24)}
    .btn-secondary{background:#fff;color:var(--brand);border:2px solid var(--brand)}
    .btn-success{background:var(--success);color:#fff}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-warn{background:var(--warn);color:#fff}
    .btn-ghost{background:rgba(255,255,255,.68);color:var(--brand);width:auto;padding:8px 12px;border:1px solid rgba(74,77,158,.15)}
    .btn-dark{background:#111827;color:#fff}

    .input,.select{
      width:100%;background:#fff;border:2px solid #e5e7eb;border-radius:18px;padding:14px 16px;
      font-size:16px;font-weight:800;outline:none;text-align:right;font-family:inherit;color:var(--dark)
    }
    .input:focus,.select:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(74,77,158,.13)}
    .box{
      background:rgba(255,255,255,.95);border-radius:22px;padding:15px;
      box-shadow:0 8px 22px rgba(23,24,39,.06);border:1px solid rgba(17,24,39,.05)
    }
    .glass{
      background:rgba(255,255,255,.78);
      backdrop-filter:blur(9px);
      border:1px solid rgba(255,255,255,.62);
    }
    .topbar{
      position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:8px;
      margin:0 -6px 14px;padding:8px 6px;border-radius:18px;background:rgba(255,255,255,.60);backdrop-filter:blur(10px)
    }
    .top-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .pill{
      display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:900;
      background:#eef0ff;color:var(--brand);white-space:nowrap
    }
    .pill.dark{background:#111827;color:#fff}
    .room-code{
      direction:ltr;background:#fff;border:2px dashed var(--brand);color:var(--brand);font-size:30px;
      letter-spacing:5px;font-weight:900;border-radius:20px;padding:15px;text-align:center
    }
    .list{display:flex;flex-direction:column;gap:8px}
    .row{
      display:flex;align-items:center;justify-content:space-between;gap:8px;background:#fff;border-radius:16px;
      padding:11px 13px;border:1px solid #eef0f4
    }
    .tag{
      display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:900;border-radius:999px;
      padding:4px 9px;background:#eef0ff;color:var(--brand);white-space:nowrap
    }

    .tag.warn{background:#fffbeb;color:#b45309}.tag.danger{background:#fee2e2;color:#b91c1c}
    .tag.ok{background:#dcfce7;color:#166534}

    .grid-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
    .char-card{

    .char-card:hover{transform:translateY(-2px);border-color:var(--brand)}
    .char-card.locked{opacity:.50;cursor:not-allowed;filter:grayscale(.4)}
    .char-card.chosen{border-color:var(--brand);opacity:1}
    .char-card.back-card{padding:0;background-color:var(--brand)}

    .char-emoji{font-size:32px}
    .char-name{font-weight:900;font-size:12px;line-height:1.25}
    .big-character-card{

      display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:26px;border:2px solid rgba(74,77,158,.18)
    }

    .scoreboard{display:flex;flex-direction:column;gap:8px}
    .score-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:#fff;border-radius:16px;padding:10px 12px;border:2px solid transparent}
    .score-row.current{border-color:var(--warn);background:#fffbeb}.score{font-weight:900;font-size:18px}.score.zero{color:var(--success)}.score.neg{color:var(--danger)}

    .game-bg{position:relative;min-height:100vh;max-width:520px;margin:0 auto;background:transparent}
    .game-bg>*{position:relative;z-index:1}
    .phase-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:18px;background:transparent;backdrop-filter:none;z-index:5;min-height:100vh}
    .phase-card{background:var(--brand);color:#fff;border-radius:30px;padding:24px 20px;box-shadow:0 25px 70px rgba(0,0,0,.32);line-height:1.8;text-align:right;border:2px solid rgba(255,255,255,.18)}

    .game-card-wrap{perspective:900px;max-width:300px;margin:0 auto}
    .game-card{width:100%;aspect-ratio:5/7;border-radius:28px;position:relative;transform-style:preserve-3d;transition:transform .42s}
    .game-card.flipped{transform:rotateY(180deg)}
    .face{
      position:absolute;inset:0;border-radius:28px;backface-visibility:hidden;overflow:hidden;
      box-shadow:0 15px 35px rgba(23,24,39,.16);border:2px solid rgba(74,77,158,.18)
    }
    .front{
      transform:rotateY(180deg);
      background:#fff url('card-face.png') center/cover no-repeat;
      color:#111827;
    }
    .back{
      background:var(--brand) url('card-back.png') center/cover no-repeat;
      display:block;
    }
    .card-face-content{
      position:absolute;inset:0;
      padding:40px 32px 26px;
      display:flex;flex-direction:column;justify-content:space-between;align-items:stretch;
      background:transparent;
    }
    .card-type{font-size:13px;font-weight:900;color:var(--brand);text-align:right}
    .card-title{font-size:24px;font-weight:900;text-align:center;line-height:1.25}
    .card-text{font-size:18px;font-weight:900;line-height:1.65;text-align:center}
    .points{align-self:center;background:#fee2e2;color:#b91c1c;border-radius:999px;padding:7px 16px;font-weight:900}
    .points.blue{background:#eef0ff;color:var(--brand)}
    .points.dark{background:#111827;color:#fff}

    .effects{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
    .effect{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:16px;padding:10px 12px;font-size:13px;font-weight:800;line-height:1.5}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .three{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .footer-actions{
      position:sticky;bottom:0;background:linear-gradient(transparent,rgba(255,255,255,.86) 18%,rgba(255,255,255,.92));
      padding-top:16px;padding-bottom:4px;z-index:10
    }
    .notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:16px;padding:12px;line-height:1.6;font-weight:800}
    .ok{background:#ecfdf5;border-color:#bbf7d0;color:#166534}.bad{background:#fef2f2;border-color:#fecaca;color:#991b1b}
    .vote-line{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:10px 0}
    .vote-chip{border-radius:999px;padding:7px 11px;background:#fff;border:1px solid #e5e7eb;font-size:12px;font-weight:900}
    .punishment-card{background:#111827;color:#fff;border-radius:24px;padding:18px;border:2px solid rgba(255,255,255,.14);box-shadow:0 18px 45px rgba(0,0,0,.28)}

    @media(max-width:420px){
      .screen{padding:12px}
      #app{border-radius:22px}
      .grid-cards{gap:6px}
      .char-card{min-height:112px}
      .card-text{font-size:16px}
      .card-title{font-size:21px}
      .room-code{font-size:23px}
      .btn{font-size:15px}
      .game-card-wrap{max-width:280px}
    }
  </style>
</head>

function safeText(v){ return String(v ?? '').replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s])); }
function codeGen(){ const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let c=''; for(let i=0;i<6;i++) c+=chars[Math.floor(Math.random()*chars.length)]; return c; }
function shuffle(a){ const x=[...a]; for(let i=x.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [x[i],x[j]]=[x[j],x[i]]; } return x; }
function getChar(id){ return CHARACTERS.find(c=>c.id===id); }
function isHost(){ return room && room.hostId === currentPlayerId; }
function me(){ return room?.players?.find(p=>p.id===currentPlayerId); }
function currentPlayer(){ return room?.players?.[room.currentTurnIndex || 0]; }
function currentPicker(){ return room?.players?.[room.characterPickIndex || 0]; }
function playerById(id){ return (room?.players||[]).find(p=>p.id===id); }
function scoreClass(n){ return n >= 0 ? 'zero' : 'neg'; }
function roundTypeLabel(t){ return t === 'situation' ? 'موقف' : t === 'action' ? 'أكشن' : t === 'hasib' ? 'حاسب' : t === 'punishment' ? 'عقاب' : 'كارت'; }
function normalDeckKey(roundType){ return roundType === 'situation' ? 'situationDeck' : 'actionDeck'; }
function cardBackStyle(){ return `background-image:url('${CARD_BACK_IMAGE}')`; }
function cardFaceStyle(){ return `background-image:url('${CARD_FACE_IMAGE}')`; }
function characterBackStyle(){ return `background-image:url('${CHARACTER_CARD_BACK_IMAGE}')`; }
function characterFaceStyle(){ return `background-image:url('${CHARACTER_CARD_FACE_IMAGE}')`; }
function bgStyle(img){ return `background-image:url('${img}')`; }
function isOnline(p){ return p?.isOnline !== false && (!p.lastSeen || Date.now() - p.lastSeen < 60000); }
function leftOf(players, idx){ return players[(idx - 1 + players.length) % players.length]; }
function punishmentCount(players){ return Math.max(1, Math.round((players||[]).length / 3)); }
function lowestPlayers(players){ const count = punishmentCount(players||[]); return [...(players||[])].sort((a,b)=>(a.score||0)-(b.score||0)).slice(0, count); }
function makePlayerPlans(players){ const plans = {}; (players||[]).forEach(p=>{ plans[p.id] = shuffle(POINT_PLAN); }); return plans; }
function plannedPointsFor(r, playerId, roundIndex){ return (r.playerPointPlans && r.playerPointPlans[playerId] && r.playerPointPlans[playerId][roundIndex]) || shuffle(POINT_PLAN)[roundIndex % 4]; }

  errorMsg = '';

function roomUiKey(r){
  if(!r) return '';
  const copy = {
    ...r,
    updatedAt:null,
    createdAt:null,
    players:(r.players||[]).map(p=>({...p,lastSeen:null,joinedAt:null}))
  };
  return JSON.stringify(copy);
}

function friendlyError(e){
  const msg = String(e?.message || e || '');
  if(msg.includes('permission-denied') || msg.includes('Missing or insufficient permissions')) return 'Firebase رافض الحفظ بسبب Rules. افتحي Firestore Rules وخليها تسمح بالقراءة والكتابة للرومات قبل التسليم.';
  if(msg.includes('unavailable') || msg.includes('network') || msg.includes('Failed to fetch')) return 'في مشكلة اتصال بالإنترنت أو Firebase. افتحي اللعبة من Chrome مع إنترنت ثابت أو ارفعيها على Hosting.';
  if(msg.includes('Firebase SDK')) return msg;
  return msg || 'حصل خطأ غير متوقع. افتحي Console لو محتاجة تفاصيل أكتر.';
}
function requireFirebase(){
  if(!FIREBASE_READY){ setError('لازم Firebase config يكون موجود عشان الرومات تشتغل Online.'); return false; }
  if(!FIREBASE_SDK_LOADED || !db){ setError('Firebase SDK مش متحمل. افتحي الملف من Chrome مع إنترنت أو ارفعيه على Hosting.'); return false; }
  return true;
}
async function updateRoom(patch){
  if(!room?.roomCode) return false;
  if(!requireFirebase()) return false;
  try{
    await db.collection(ROOMS).doc(room.roomCode).update({...patch, updatedAt: firebase.firestore.FieldValue.serverTimestamp()});
    return true;
  }catch(e){
    console.error('Room update failed:', e);
    setError(friendlyError(e));
    return false;
  }
}
function listen(code){
  if(unsubscribe) unsubscribe();
  unsubscribe = db.collection(ROOMS).doc(code).onSnapshot(snap=>{
    const nextRoom = snap.exists ? snap.data() : null;
    if(!nextRoom){
      room = null;
      screen = 'home';
      lastRenderKey = '';
      localStorage.removeItem('qaada_room_code');
      render();
      return;
    }
    const key = roomUiKey(nextRoom);
    room = nextRoom;
    if(key === lastRenderKey) return;
    lastRenderKey = key;
    render();
  }, err=>{
    console.error('Snapshot error:', err);
    setError(friendlyError(err));
  });
}
function copyRoomCode(code){
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = code;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try{ document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta);
  };
  if(navigator.clipboard && window.isSecureContext){ navigator.clipboard.writeText(code).catch(fallback); }
  else fallback();
}

async function createRoomAction(btn){

  const name = document.getElementById('hostName')?.value.trim();

  setLoading(btn, true, 'جاري إنشاء الروم...');
  try{
    const code = codeGen();
    const ref = db.collection(ROOMS).doc(code);
    const host = {id:currentPlayerId,name,isHost:true,characterId:null,score:0,failedCards:0,joinedAt:Date.now(),isOnline:true,lastSeen:Date.now(),leftDuringGame:false};
    const data = {
      schemaVersion:9,
      roomCode:code,
      hostId:currentPlayerId,
      maxPlayers,
      players:[host],
      phase:'lobby',
      createdAt:Date.now(),
      updatedAt:Date.now(),
      characterDeck:shuffle(CHARACTERS),
      chosenCharacterIds:[],
      characterPickIndex:0,
      revealCharacter:null,
      currentRound:0,
      totalRounds:4,
      roundTypes:['situation','situation','action','action'],
      currentTurnIndex:0,
      roundTurnCount:0,
      currentCard:null,
      pendingNormalAfterHasib:false,
      drawnCards:[],
      activeEffects:[],
      lastResult:null,
      playerPointPlans:{},
      situationDeck: shuffle(SITUATION_CARDS).map(c=>({...c,type:'situation',used:false})),
      actionDeck: shuffle(ACTION_CARDS).map(c=>({...c,type:'action',used:false})),
      hasibDeck: shuffle(HASIB_CARDS).map(c=>({...c,type:'hasib',used:false}))
    };
    await ref.set(data);
    localStorage.setItem('qaada_room_code', code);
    listen(code);
    startHeartbeat();
  }catch(e){
    console.error('Create room failed:', e);
    setError(friendlyError(e));
  }finally{
    setLoading(btn, false);
  }
}
async function joinRoomAction(btn){
  if(!requireFirebase()) return;
  const name = document.getElementById('joinName')?.value.trim();
  const code = document.getElementById('joinCode')?.value.trim().toUpperCase();
  if(!name) return setError('الاسم مطلوب');
  if(!code) return setError('الكود مطلوب');

  setLoading(btn, true, 'جاري الدخول...');
  const ref = db.collection(ROOMS).doc(code);
  try{
    await db.runTransaction(async tx=>{
      const snap = await tx.get(ref);
      if(!snap.exists) throw new Error('الروم غير موجودة');
      const r = snap.data();
      const players = r.players || [];
      const existingIdx = players.findIndex(p=>p.id===currentPlayerId);
      if(existingIdx >= 0){
        const old = players[existingIdx];
        let newScore = old.score || 0;
        if(r.phase !== 'lobby' && old.isOnline === false && newScore > 0){ newScore = -Math.abs(newScore); }
        players[existingIdx] = {...old, name, score:newScore, isOnline:true, lastSeen:Date.now(), leftDuringGame:false, rejoinPenaltyApplied: newScore < (old.score||0)};
      }else{
        if(r.phase !== 'lobby') throw new Error('اللعبة بدأت بالفعل');
        if(players.length >= r.maxPlayers) throw new Error('الروم اكتملت');
        players.push({id:currentPlayerId,name,isHost:false,characterId:null,score:0,failedCards:0,joinedAt:Date.now(),isOnline:true,lastSeen:Date.now(),leftDuringGame:false});
      }
      tx.update(ref,{players,updatedAt:Date.now()});
    });
    localStorage.setItem('qaada_room_code',code);
    listen(code);
    startHeartbeat();
  }catch(e){
    console.error('Join room failed:', e);
    setError(friendlyError(e));
  }finally{
    setLoading(btn, false);
  }
}
async function leaveRoom(){
  const localCode = room?.roomCode;
  if(!localCode){
    localStorage.removeItem('qaada_room_code');
    room=null;
    setScreen('home');
    return;
  }
  const ref = db.collection(ROOMS).doc(localCode);
  try{
    await db.runTransaction(async tx=>{
      const snap = await tx.get(ref);
      if(!snap.exists) return;
      const r = snap.data();
      let players = r.players || [];
      const gameStarted = r.phase && !['lobby','ended'].includes(r.phase);
      if(gameStarted){
        players = players.map(p=>{
          if(p.id !== currentPlayerId) return p;
          const currentScore = p.score || 0;
          return {...p, isOnline:false, lastSeen:Date.now(), leftDuringGame:true, score: currentScore > 0 ? -Math.abs(currentScore) : currentScore};
        });
        tx.update(ref,{players,updatedAt:Date.now()});
        return;
      }
      players = players.filter(p=>p.id!==currentPlayerId);
      if(players.length === 0){ tx.delete(ref); return; }
      let hostId = r.hostId;
      if(hostId === currentPlayerId){
        hostId = players[0].id;
        players = players.map((p,i)=>({...p,isHost:i===0}));
      }
      tx.update(ref,{players,hostId,updatedAt:Date.now()});
    });
  }catch(e){
    console.warn('Leave room warning:', e);
  }
  if(unsubscribe) unsubscribe();
  if(heartbeatTimer) clearInterval(heartbeatTimer);
  unsubscribe=null;
  heartbeatTimer=null;
  room=null;
  lastRenderKey='';
  localStorage.removeItem('qaada_room_code');
  setScreen('home');
}
function forceHome(){
  if(unsubscribe) unsubscribe();
  if(heartbeatTimer) clearInterval(heartbeatTimer);

function startHeartbeat(){
  if(heartbeatTimer) clearInterval(heartbeatTimer);

    if(!room?.roomCode || !db) return;

// ===================== 6) Character selection =====================
async function pickCharacter(index){
  if(!room) return;
  const picker = currentPicker();
  if(!picker || picker.id !== currentPlayerId) return setError('مش دورك دلوقتي');
  const ref = db.collection(ROOMS).doc(room.roomCode);
  try{
    await db.runTransaction(async tx=>{
      const snap = await tx.get(ref);
      const r = snap.data();
      const players = r.players || [];
      const pickerNow = players[r.characterPickIndex || 0];
      if(!pickerNow || pickerNow.id !== currentPlayerId) throw new Error('مش دورك دلوقتي');
      const selected = r.characterDeck[index];
      if(!selected || (r.chosenCharacterIds||[]).includes(selected.id)) throw new Error('الشخصية اتاخدت');
      const updatedPlayers = players.map(p=>p.id===currentPlayerId ? {...p,characterId:selected.id} : p);
      const chosenCharacterIds = [...(r.chosenCharacterIds||[]), selected.id];
      const allChosen = updatedPlayers.every(p=>p.characterId);
      tx.update(ref,{
        players:updatedPlayers,
        chosenCharacterIds,
        revealCharacter:{playerId:currentPlayerId, charId:selected.id, allChosen, nextIndex:(r.characterPickIndex||0)+1},
        phase:'character_reveal',
        updatedAt:Date.now()
      });
    });
  }catch(e){ setError(friendlyError(e)); }
}
async function confirmCharacter(){
  if(!room?.revealCharacter) return;
  const reveal = room.revealCharacter;
  if(reveal.playerId !== currentPlayerId && !isHost()) return setError('صاحب الشخصية بس يأكد إنه عرفها');
  if(reveal.allChosen){
    await updateRoom({phase:'intro_situations', revealCharacter:null, characterPickIndex:room.characterPickIndex||0});
  }else{
    await updateRoom({phase:'character_selection', revealCharacter:null, characterPickIndex:reveal.nextIndex || ((room.characterPickIndex||0)+1)});
  }
}

// ===================== 7) Gameplay actions =====================
function pickFromDeckByPoints(deck, targetPoints){
  const exactUnused = (deck||[]).filter(c=>!c.used && Number(c.points)===Number(targetPoints));
  let picked = exactUnused[Math.floor(Math.random()*exactUnused.length)];
  let updatedDeck = deck || [];
  if(picked){
    updatedDeck = updatedDeck.map(c=>c.id===picked.id ? {...c,used:true} : c);
    return {card:picked, deck:updatedDeck};
  }
  const exactAny = (deck||[]).filter(c=>Number(c.points)===Number(targetPoints));
  picked = exactAny[Math.floor(Math.random()*exactAny.length)];
  if(picked){
    return {card:{...picked,id:picked.id+'_reuse_'+Date.now(),reused:true}, deck:updatedDeck};
  }
  const anyUnused = (deck||[]).filter(c=>!c.used);
  picked = anyUnused[Math.floor(Math.random()*anyUnused.length)] || (deck||[])[Math.floor(Math.random()*(deck||[]).length)];
  if(!picked) throw new Error('مفيش كروت متاحة');
  updatedDeck = updatedDeck.map(c=>c.id===picked.id ? {...c,used:true} : c);
  return {card:picked, deck:updatedDeck};
}
async function drawCard(btn){
  if(!room) return;
  const cp = currentPlayer();
  if(!cp || cp.id !== currentPlayerId) return setError('مش دورك دلوقتي');
  setLoading(btn, true, 'جاري السحب...');
  const ref = db.collection(ROOMS).doc(room.roomCode);
  try{
    await db.runTransaction(async tx=>{
      const snap = await tx.get(ref);
      const r = snap.data();
      const players = r.players || [];
      const idx = r.currentTurnIndex || 0;
      const current = players[idx];
      if(!current || current.id !== currentPlayerId) throw new Error('مش دورك دلوقتي');
      if(r.currentCard) throw new Error('في كارت مفتوح بالفعل');

      const roundType = r.roundTypes?.[r.currentRound] || 'situation';
      const hasibAvailable = (r.hasibDeck||[]).filter(c=>!c.used);
      const shouldHasib = !r.pendingNormalAfterHasib && hasibAvailable.length && Math.random() < 0.22;
      let update = {};
      let card = null;
      let isBonusHasib = false;

      if(shouldHasib){
        card = hasibAvailable[Math.floor(Math.random()*hasibAvailable.length)];
        isBonusHasib = true;
        update.hasibDeck = (r.hasibDeck||[]).map(c=>c.id===card.id ? {...c,used:true} : c);
      }else{
        const targetPoints = plannedPointsFor(r, current.id, r.currentRound || 0);
        const key = normalDeckKey(roundType);
        const result = pickFromDeckByPoints(r[key] || [], targetPoints);
        card = {...result.card, points:targetPoints};
        update[key] = result.deck;
        update.pendingNormalAfterHasib = false;
      }

      update.currentCard = {
        ...card,
        type: card.type || (isBonusHasib ? 'hasib' : roundType),
        ownerId: current.id,
        revealed:true,
        isBonusHasib,
        votes:{},
        targetId:null,
        createdAt:Date.now()
      };
      update.drawnCards = [...(r.drawnCards||[]), card.id];
      update.lastResult = null;
      update.updatedAt = Date.now();
      tx.update(ref, update);
    });
  }catch(e){
    setError(friendlyError(e));
  }finally{
    setLoading(btn, false);
  }
}
function eligibleVoterIds(players, ownerId){
  return (players||[]).filter(p=>p.id!==ownerId && p.isOnline !== false).map(p=>p.id);
}
function applyScore(players, playerId, delta, failInc=false){
  return (players || []).map(p => {
    if(p.id !== playerId) return p;

    let score = p.score || 0;
    let failedCards = p.failedCards || 0;

    if(failInc){
      failedCards += 1;

      // أول مرتين فشل: اللاعب يلبس سالب الكارت عادي.
      if(failedCards <= 2){
        score += delta;
      }
      // من تالت مرة فشل: لو موجب يتصفر، ولو سالب يتضاعف بالسالب.
      else{
        if(score > 0) score = 0;
        else if(score < 0) score = score * 2;
        else score = 0;

        // نبدأ العد من جديد بعد تطبيق عقوبة الفشل المتكرر.
        failedCards = 0;
      }
    }else{
      score += delta;
    }

    return {...p, score, failedCards};
  });
}
function repeatFailPenaltyInfo(player, success){
  if(success || !player) return null;
  const nextFails = (player.failedCards || 0) + 1;
  if(nextFails <= 2) return null;
  const score = player.score || 0;
  if(score > 0) return 'فشل أكتر من مرتين، فتم تصفير نقطه الموجبة.';
  if(score < 0) return 'فشل أكتر من مرتين، فتم مضاعفة السالب عليه.';
  return 'فشل أكتر من مرتين، ونقطه كانت صفر.';
}
function applyNegativeCopyEffects(r, players, playerId, delta){
  if(delta >= 0) return players;
  const effects = (r.activeEffects||[]).filter(e=>e.effectType==='copy_negative_to_left' && e.playerId===playerId);
  let out = players;
  effects.forEach(e=>{ out = applyScore(out, e.targetPlayerId, delta, false); });
  return out;
}
function decrementEffectsForPlayer(effects, playerId){
  return (effects||[]).map(e=>{
    if(e.playerId !== playerId) return e;
    if(e.remainingTurns >= 900) return e;
    return {...e, remainingTurns:e.remainingTurns-1};
  }).filter(e=>e.remainingTurns > 0);
}
function buildFinalizePatch(r, votes){
  const card = r.currentCard;
  const players = r.players || [];
  const ownerId = card.ownerId;
  const idx = players.findIndex(p=>p.id===ownerId);
  const owner = players[idx];
  const successVotes = Object.values(votes||{}).filter(v=>v==='success').length;
  const failVotes = Object.values(votes||{}).filter(v=>v==='fail').length;
  const success = successVotes > failVotes;
  const delta = success ? (card.points||0) : -(card.points||0);
  const scoreBefore = owner?.score || 0;
  const repeatPenaltyText = repeatFailPenaltyInfo(owner, success);
  let updatedPlayers = applyScore(players, ownerId, delta, !success);
  updatedPlayers = applyNegativeCopyEffects(r, updatedPlayers, ownerId, delta);
  const updatedOwner = updatedPlayers.find(p=>p.id===ownerId);
  const actualDelta = (updatedOwner?.score || 0) - scoreBefore;
  let activeEffects = [...(r.activeEffects||[])];

  if(success && card.type === 'hasib'){
    if(card.effectType === 'swap_scores' && card.targetId){
      const a = updatedPlayers.findIndex(p=>p.id===ownerId);
      const b = updatedPlayers.findIndex(p=>p.id===card.targetId);
      if(a >= 0 && b >= 0){
        const s = updatedPlayers[a].score || 0;
        updatedPlayers[a] = {...updatedPlayers[a], score: updatedPlayers[b].score || 0};
        updatedPlayers[b] = {...updatedPlayers[b], score: s};
      }
    }else if(card.effectType === 'copy_negative_to_left'){
      const left = leftOf(players, idx);
      if(left){
        activeEffects.push({id:'eff_'+Date.now(),playerId:ownerId,targetPlayerId:left.id,title:card.title,effectType:card.effectType,remainingTurns:999,penalty:card.points,text:card.text});
      }
    }else if(['silence','vlog','translate','question_only','lag','hashtag','mirror','paranoia','statue'].includes(card.effectType)){
      activeEffects.push({id:'eff_'+Date.now(),playerId:ownerId,targetPlayerId:ownerId,title:card.title,effectType:card.effectType,remainingTurns:card.duration||3,penalty:card.points,text:card.text});
    }
  }

  const lastResult = {
    cardTitle: card.title,
    playerName: owner?.name || '',
    playerId: ownerId,
    success,
    delta: actualDelta,
    cardDelta: delta,
    repeatPenaltyText,
    successVotes,
    failVotes
  };

  if(card.isBonusHasib){
    return {
      players:updatedPlayers,
      activeEffects,
      currentCard:null,
      pendingNormalAfterHasib:true,
      lastResult,
      updatedAt:Date.now()
    };
  }

  activeEffects = decrementEffectsForPlayer(activeEffects, ownerId);
  const nextTurn = ((r.currentTurnIndex || 0) + 1) % players.length;
  let nextRound = r.currentRound || 0;
  let roundTurnCount = (r.roundTurnCount || 0) + 1;
  let phase = 'playing';

  if(roundTurnCount >= players.length){
    nextRound += 1;
    roundTurnCount = 0;
    if(nextRound === 2) phase = 'intro_actions';
    if(nextRound >= (r.totalRounds || 4)) phase = 'intro_punishment';
  }

  return {
    players:updatedPlayers,
    activeEffects,
    currentCard:null,
    pendingNormalAfterHasib:false,
    currentTurnIndex:nextTurn,
    currentRound:nextRound,
    roundTurnCount,
    phase,
    lastResult,
    updatedAt:Date.now()
  };
}
async function voteCard(result, btn){
  if(!room?.currentCard) return;
  const card = room.currentCard;
  if(card.ownerId === currentPlayerId) return setError('صاحب الدور مينفعش يصوت لنفسه');
  if(card.votes && card.votes[currentPlayerId]) return setError('أنت صوتت خلاص');
  if(card.needsTarget && !card.targetId) return setError('مستنيين صاحب الدور يختار اللاعب');
  setLoading(btn, true, 'جاري التصويت...');
  const ref = db.collection(ROOMS).doc(room.roomCode);
  try{
    await db.runTransaction(async tx=>{
      const snap = await tx.get(ref);
      const r = snap.data();
      const c = r.currentCard;
      if(!c) throw new Error('مفيش كارت مفتوح');
      if(c.ownerId === currentPlayerId) throw new Error('صاحب الدور مينفعش يصوت لنفسه');
      const expected = eligibleVoterIds(r.players||[], c.ownerId);
      if(!expected.includes(currentPlayerId)) throw new Error('التصويت مش متاح لك دلوقتي');
      if(c.needsTarget && !c.targetId) throw new Error('مستنيين صاحب الدور يختار اللاعب');
      const votes = {...(c.votes||{}), [currentPlayerId]: result};
      const votedCount = expected.filter(id=>votes[id]).length;
      if(votedCount >= expected.length){
        tx.update(ref, buildFinalizePatch({...r,currentCard:{...c,votes}}, votes));
      }else{
        tx.update(ref, {currentCard:{...c,votes}, updatedAt:Date.now()});
      }
    });
  }catch(e){
    setError(friendlyError(e));
  }finally{
    setLoading(btn, false);
  }
}
async function chooseHasibTarget(btn){
  if(!room?.currentCard) return;
  const card = room.currentCard;
  if(card.ownerId !== currentPlayerId) return;
  const targetId = document.getElementById('targetPlayer')?.value;
  if(!targetId) return setError('اختار لاعب الأول');
  setLoading(btn, true, 'جاري التثبيت...');
  try{
    await updateRoom({currentCard:{...card,targetId}});
  }finally{
    setLoading(btn, false);
  }
}
async function breakEffect(effectId){
  if(!room) return;
  if(!requireFirebase()) return;
  const effect = (room.activeEffects||[]).find(e=>e.id===effectId);
  if(!effect) return;
  if(!isHost() && effect.playerId !== currentPlayerId) return setError('المضيف أو صاحب الحكم بس يقدر يسجل كسر الحكم');
  const ref = db.collection(ROOMS).doc(room.roomCode);
  try{
    await db.runTransaction(async tx=>{
      const snap = await tx.get(ref); const r = snap.data();
      const e = (r.activeEffects||[]).find(x=>x.id===effectId); if(!e) return;
      const players = applyScore(r.players||[], e.playerId, -(e.penalty||3), true);
      const activeEffects = (r.activeEffects||[]).filter(x=>x.id!==effectId);
      tx.update(ref,{players,activeEffects,updatedAt:Date.now()});
    });
  }catch(e){
    setError(friendlyError(e));
  }
}
async function completePunishment(btn){
  if(!room) return;
  const ids = room.punishmentPlayers || [];
  const idx = room.punishmentIndex || 0;
  const currentLoserId = ids[idx];
  if(currentPlayerId !== currentLoserId && !isHost()) return setError('العقاب يتسجل من اللاعب أو المضيف');
  setLoading(btn, true, 'جاري...');
  try{
    if(idx + 1 >= ids.length){ await updateRoom({phase:'ended',updatedAt:Date.now()}); }
    else { await updateRoom({punishmentIndex:idx+1,updatedAt:Date.now()}); }
  }finally{
    setLoading(btn, false);
  }
}
async function resetGame(){
  if(!isHost()) return;
  const players = (room.players||[]).map(p=>({...p,characterId:null,score:0,failedCards:0,isOnline:p.id===currentPlayerId ? true : p.isOnline,lastSeen:p.id===currentPlayerId ? Date.now() : p.lastSeen,leftDuringGame:false,rejoinPenaltyApplied:false}));
  await updateRoom({
    phase:'lobby',
    players,
    currentRound:0,
    currentTurnIndex:0,
    roundTurnCount:0,
    currentCard:null,
    activeEffects:[],
    chosenCharacterIds:[],
    characterPickIndex:0,
    revealCharacter:null,
    punishmentPlayers:[],
    punishmentIndex:0,
    punishmentCards:[],
    pendingNormalAfterHasib:false,
    lastResult:null,
    playerPointPlans:{},
    situationDeck: shuffle(SITUATION_CARDS).map(c=>({...c,type:'situation',used:false})),
    actionDeck: shuffle(ACTION_CARDS).map(c=>({...c,type:'action',used:false})),
    hasibDeck: shuffle(HASIB_CARDS).map(c=>({...c,type:'hasib',used:false}))
  });
}

  const votes = card.votes || {};
  const successVotes = expected.filter(id=>votes[id]==='success').length;
  const failVotes = expected.filter(id=>votes[id]==='fail').length;
  const votedCount = expected.filter(id=>votes[id]).length;
  return `<div class="vote-line">
    <span class="vote-chip">التصويت ${votedCount}/${expected.length}</span>
    <span class="vote-chip">نجح: ${successVotes}</span>
    <span class="vote-chip">فشل: ${failVotes}</span>
  </div>`;
}
function cardControls(card,myTurn){
  if(!card){
    return `<div class="footer-actions"><button class="btn btn-primary" ${myTurn?'':'disabled'} onclick="drawCard(this)">${myTurn?'اسحب كارت':'مش دورك دلوقتي'}</button>${room.pendingNormalAfterHasib?'<p class="tiny text-center mt-2">بعد كارت حاسب، اسحب كارت الراوند الأساسي.</p>':''}</div>`;
  }

  const owner = playerById(card.ownerId);
  const alreadyVoted = card.votes && card.votes[currentPlayerId];
  const targetName = card.targetId ? playerById(card.targetId)?.name : '';
  const needsTarget = card.needsTarget && !card.targetId;

  if(myTurn){
    let target = '';
    if(card.needsTarget){
      target = card.targetId
        ? `<div class="notice ok text-center mb-3">اختارت تبدل مع: <b>${safeText(targetName)}</b></div>`
        : `<select id="targetPlayer" class="select mb-3"><option value="">اختار لاعب للتبديل</option>${(room.players||[]).filter(p=>p.id!==currentPlayerId).map(p=>`<option value="${p.id}">${safeText(p.name)}</option>`).join('')}</select><button class="btn btn-secondary mb-3" onclick="chooseHasibTarget(this)">تأكيد الاختيار</button>`;
    }
    return `<div class="footer-actions">${target}${voteStatusHtml(card)}<div class="notice ok text-center">مستنيين باقي اللعيبة يصوتوا على ${safeText(owner?.name||'اللاعب')}</div></div>`;
  }

  if(needsTarget){
    return `<div class="footer-actions">${voteStatusHtml(card)}<div class="notice text-center">مستنيين صاحب الدور يختار اللاعب الأول</div></div>`;
  }

  if(alreadyVoted){
    return `<div class="footer-actions">${voteStatusHtml(card)}<div class="notice ok text-center">صوتك اتحسب: ${alreadyVoted==='success'?'نجح':'فشل'}</div></div>`;
  }

  return `<div class="footer-actions">${voteStatusHtml(card)}<p class="tiny text-center mb-2">صوتوا: هل ${safeText(owner?.name||'اللاعب')} نفذ الكارت/الموقف؟</p><div class="two"><button class="btn btn-success" onclick="voteCard('success', this)">نجح</button><button class="btn btn-danger" onclick="voteCard('fail', this)">فشل</button></div></div>`;
}
function renderIntro(kind){
  const data = {
    character:{title:'اختيار الشخصيات',text:'كل لاعب هيختار كارت شخصية بالدور. بعد الاختيار هيظهرله وش الشخصية ويضغط تأكيد عشان الدور يروح للي بعده.' ,btn:'ابدأ اختيار الشخصيات',fn:'beginCharacterSelection()'},
    situations:{title:'راوندات المواقف',text:'هنلعب راوندين مواقف. اللاعب يرد بشخصيته، وباقي اللعيبة يصوتوا نجح أو فشل. النقط تتحسب بالأغلبية.' ,btn:'ابدأ المواقف',fn:'beginSituations()'},
    actions:{title:'راوندات الأكشن',text:'هنلعب راوندين أكشن. كل لاعب على مدار الأربع راوندات هيجيله 3 و5 و10 و10 بشكل عشوائي، وباقي اللعيبة يصوتوا على التنفيذ.',btn:'ابدأ الأكشن',fn:'beginActions()'},
    punishment:{title:'العقاب',text:'الأربع راوندات خلصوا. العقاب هيتطبق على أقل تلت اللعيبة تقريبًا حسب عدد اللاعبين، وكل واحد منهم ياخد كارت عقاب.',btn:'ابدأ العقاب',fn:'beginPunishment()'}
  }[kind];
  app.innerHTML = `<div class="screen game-bg"><div class="topbar"><span class="pill">${data.title}</span>${exitButtons()}</div><div class="phase-overlay"><div class="phase-card"><h2>${data.title}</h2><p>${data.text}</p>${isHost()?`<button class="btn" onclick="${data.fn}">${data.btn}</button>`:`<p class="mt-4">في انتظار المضيف يبدأ المرحلة...</p>`}</div></div></div>`;
}
function renderPunishment(){
  const ids = room.punishmentPlayers || [];
  const idx = room.punishmentIndex || 0;
  const player = (room.players||[]).find(p=>p.id===ids[idx]);
  const card = (room.punishmentCards||[])[idx] || ACTION_CARDS.find(c=>c.points===10) || ACTION_CARDS[0];
  const punishedList = ids.map(id=>playerById(id)).filter(Boolean);
  app.innerHTML = `<div class="screen game-bg"><div class="topbar"><span class="pill">عقاب ${idx+1}/${ids.length}</span>${exitButtons()}</div>${errorHtml()}
    <div class="box glass mb-4"><b>العقاب يتطبق على:</b><div class="list mt-3">${punishedList.map((p,i)=>`<div class="row ${p.id===player?.id?'current':''}"><b>${i+1}- ${safeText(p.name)}</b><span class="score ${scoreClass(p.score||0)}">${p.score||0}</span></div>`).join('')}</div></div>
    <div class="punishment-card mb-4"><h2 style="font-size:26px;font-weight:900;margin-bottom:8px">${safeText(player?.name||'لاعب')} عليه العقاب</h2><p style="color:#e5e7eb">كارت عقاب إجباري</p></div>
    <div class="game-card-wrap mb-4"><div class="game-card flipped"><div class="face back" style="${cardBackStyle()}"></div><div class="face front" style="${cardFaceStyle()}">${cardFront({...card,type:'punishment',points:10})}</div></div></div>
    ${(currentPlayerId===player?.id||isHost())?'<button class="btn btn-success" onclick="completePunishment(this)">تم تنفيذ العقاب</button>':'<div class="notice ok text-center">مستنيين تنفيذ العقاب</div>'}
  </div>`;
}
function renderEnd(){
  const sorted=[...(room.players||[])].sort((a,b)=>(b.score||0)-(a.score||0));
  const winner=sorted[0];
  const loser=sorted[sorted.length-1];
  app.innerHTML = `<div class="screen game-bg"><div class="topbar"><span class="pill">النهاية</span>${exitButtons()}</div><div class="center">
    <div style="font-size:64px">👑</div><h2 class="brand" style="font-size:32px;font-weight:900">اللعبة خلصت</h2>
    <div class="box glass w-full"><p class="sub mb-2">الفائز: <b>${safeText(winner?.name||'')}</b></p><p class="tiny">أقل لاعب في النقط: ${safeText(loser?.name||'')}</p><div class="scoreboard mt-4">${sorted.map((p,i)=>`<div class="score-row ${i===0?'current':''}"><b>${i+1}- ${safeText(p.name)}</b><span class="score ${scoreClass(p.score||0)}">${p.score||0}</span></div>`).join('')}</div></div>
    ${isHost()?'<button class="btn btn-primary" onclick="resetGame()">العبوا تاني</button>':''}<button class="btn btn-secondary" onclick="leaveRoom()">رجوع للرئيسية</button>
  </div></div>`;
}

Object.assign(window, {
  setScreen, copyRoomCode, createRoomAction, joinRoomAction, leaveRoom, forceHome,
  startGame, beginCharacterSelection, beginSituations, beginActions, beginPunishment,
  pickCharacter, confirmCharacter, drawCard, voteCard, chooseHasibTarget, breakEffect,
  completePunishment, resetGame
});

const savedRoom = localStorage.getItem('qaada_room_code');
if(savedRoom && FIREBASE_READY && FIREBASE_SDK_LOADED && db){
  listen(savedRoom);
  startHeartbeat();
}
render();
</script>
</body>
</html>
